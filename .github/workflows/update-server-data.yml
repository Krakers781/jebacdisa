name: Update FiveM server data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-fivem-server-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Fetch FiveM data
        run: node scripts/update-server-data.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/server.json data/server-data.js config/players-data.js; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/server.json data/server-data.js config/players-data.js
          git commit -m "Update FiveM server data"
          git push
